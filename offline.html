<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — D18 Notes</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f0f2f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #1e1e2e;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
  }
  .icon { font-size: 4rem; margin-bottom: 20px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: #1e1e2e; }
  p  { font-size: 0.9rem; color: #8890a4; line-height: 1.6; margin-bottom: 28px; }
  button {
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 32px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(108,99,255,0.35);
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📵</div>
  <h1>You're Offline</h1>
  <p>D18 Notes needs an internet connection to load your notes. Please check your connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
